<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Trip 2026 🇯🇵</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-blue">

  <div id="app">
    <header>
      <div class="theme-switcher">
        <button class="theme-opt active" data-theme="theme-blue" title="Japanese Blue">🔵</button>
        <button class="theme-opt" data-theme="theme-light" title="Light">⚪</button>
        <button class="theme-opt" data-theme="theme-green" title="Nature">🟢</button>
        <button class="theme-opt" data-theme="theme-purple" title="Purple Gold">🟣</button>
      </div>
      <h1>🇯🇵 Japan Trip 2026</h1>
      <p class="subtitle">Amit · Moshe · Omri</p>
    </header>

    <div id="calendar-section">
      <div class="month-nav">
        <button id="prevMonth">◀</button>
        <h2 id="monthTitle"></h2>
        <button id="nextMonth">▶</button>
      </div>
      <div id="calendar"></div>
    </div>

    <div id="day-panel" class="hidden">
      <div class="day-panel-header">
        <button id="closePanel">✕</button>
        <h2 id="dayTitle"></h2>
        <button id="editBtn" class="edit-btn">✏️ Edit</button>
      </div>

      <div id="view-mode">
        <div class="view-section" id="view-hotel"></div>
        <div class="view-section" id="view-general"></div>
        <div class="view-section" id="view-places"></div>
        <div class="view-section" id="view-food"></div>
        <div class="view-section" id="view-mood"></div>
      </div>

      <div id="edit-mode" class="hidden">
        <div class="section">
          <h3>🏨 Hotel</h3>
          <input type="text" id="hotelName" placeholder="Hotel name" />
          <input type="text" id="hotelAddress" placeholder="Hotel address" />
        </div>

        <div class="section">
          <h3>📋 General Info</h3>
          <textarea id="generalInfo" placeholder="Transportation, budget, weather, anything..."></textarea>
        </div>

        <div class="section">
          <h3>📍 Attractions</h3>
          <div id="placesList"></div>
          <button class="add-btn" id="addPlace">+ Add Attraction</button>
        </div>

        <div class="section">
          <h3>🍜 Food</h3>
          <div id="foodList"></div>
          <button class="add-btn" id="addFood">+ Add Restaurant</button>
        </div>

        <div class="section">
          <h3>😄 Omri's Mood</h3>
          <div class="mood-selector" id="moodSelector">
            <button class="mood-btn" data-mood="sad">😢</button>
            <button class="mood-btn" data-mood="neutral">😐</button>
            <button class="mood-btn" data-mood="happy">😄</button>
            <button class="mood-btn" data-mood="angry">😤</button>
          </div>
        </div>

        <button id="saveDay" class="save-btn">💾 Save</button>
        <button id="cancelEdit" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="location-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="closeModal">✕</button>
      </div>
      <div id="modal-notes" class="modal-notes"></div>
      <div class="modal-search">
        <input type="text" id="modalSearchInput" placeholder="Search location..." />
        <div id="modalSearchResults" class="search-results"></div>
      </div>
      <a id="modalMapsBtn" class="maps-btn" target="_blank">📍 Open in Google Maps</a>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
