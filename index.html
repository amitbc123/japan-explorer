<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Trip 2026 🇯🇵</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <header>
      <h1>🇯🇵 Japan Trip 2026</h1>
      <p class="subtitle">Amit · Moshe · Omri</p>
    </header>

    <div id="calendar-section">
      <div class="month-nav">
        <button id="prevMonth">◀</button>
        <h2 id="monthTitle"></h2>
        <button id="nextMonth">▶</button>
      </div>
      <div id="calendar"></div>
    </div>

    <div id="day-panel" class="hidden">

      <div class="day-panel-header">
        <button id="closePanel">✕</button>
        <h2 id="dayTitle"></h2>
        <button id="editBtn" class="edit-btn">✏️ Edit</button>
      </div>

      <div id="view-mode">
        <div class="view-section" id="view-hotel"></div>
        <div class="view-section" id="view-general"></div>
        <div class="view-section" id="view-places"></div>
        <div class="view-section" id="view-food"></div>
        <div class="view-section" id="view-mood"></div>
      </div>

      <div id="edit-mode" class="hidden">
        <div class="section">
          <h3>🏨 Accommodation</h3>
          <input type="text" id="hotelName" placeholder="Hotel name" />
          <input type="text" id="hotelAddress" placeholder="Hotel address" />
        </div>

        <div class="section">
          <h3>📋 General Info</h3>
          <textarea id="generalInfo" placeholder="Transportation, budget, weather, anything..."></textarea>
        </div>

        <div class="section">
          <h3>📍 Attractions</h3>
          <div id="placesList"></div>
          <button class="add-btn" id="addPlace">+ Add Attraction</button>
        </div>

        <div class="section">
          <h3>🍜 Food & Restaurants</h3>
          <div id="foodList"></div>
          <button class="add-btn" id="addFood">+ Add Restaurant / Food</button>
        </div>

        <div class="section">
          <h3>😄 Omri's Mood</h3>
          <div class="mood-selector" id="moodSelector">
            <button class="mood-btn" data-mood="sad">😢</button>
            <button class="mood-btn" data-mood="neutral">😐</button>
            <button class="mood-btn" data-mood="happy">😄</button>
            <button class="mood-btn" data-mood="angry">😤</button>
          </div>
        </div>

        <button id="saveDay" class="save-btn">💾 Save</button>
        <button id="cancelEdit" class="cancel-btn">Cancel</button>
      </div>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
